version: '3.8'

services:
  llm-debate-web:
    build: .
    ports:
      - "7000:8000"
    volumes:
      - ./llm_debate:/app/llm_debate
      - ./web:/app/web
      - ~/.claude:/root/.claude  # Mount Claude config
      - ~/.config/codex:/root/.config/codex  # Mount Codex config
      - ~/.config/gh:/root/.config/gh  # Mount GitHub CLI config (RW for migrations)
      # Mount Claude CLI binary (Codex is installed in container)
      - ~/.local/bin/claude:/usr/local/bin/claude:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - CLAUDE_BIN=/usr/local/bin/claude
      - CODEX_BIN=/usr/bin/codex  # Installed via npm in container
    restart: unless-stopped
    command: uvicorn web.backend.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  default:
    name: llm-debate-network
