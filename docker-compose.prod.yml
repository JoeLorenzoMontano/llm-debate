version: '3.8'

services:
  llm-debate-web:
    build: .
    ports:
      - "0.0.0.0:7000:8000"  # External port 7000, internal 8000
    volumes:
      # Mount CLI configurations (read-only for security)
      - ~/.claude:/root/.claude:ro
      - ~/.config/codex:/root/.config/codex:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    restart: unless-stopped
    # Production command (no reload)
    command: uvicorn web.backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: llm-debate-network
